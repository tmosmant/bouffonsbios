<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>Déployer le site — Admin</title>
		<style>
			:root {
				color-scheme: light;
				--bg: #f6f1e8;
				--fg: #1c221c;
				--accent: #8f2d4a;
				--muted: #5a5c52;
				--border: #dcd4c8;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font-family: system-ui, sans-serif;
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 1.5rem;
				background: var(--bg);
				color: var(--fg);
				line-height: 1.5;
			}
			.card {
				width: 100%;
				max-width: 26rem;
				padding: 1.5rem 1.35rem;
				border-radius: 0.9rem;
				border: 1px solid var(--border);
				background: #fffef9;
				box-shadow: 0 8px 28px rgba(28, 34, 28, 0.08);
			}
			h1 {
				font-size: 1.15rem;
				margin: 0 0 0.35rem;
			}
			p {
				margin: 0 0 1rem;
				font-size: 0.9rem;
				color: var(--muted);
			}
			label {
				display: block;
				font-size: 0.82rem;
				font-weight: 600;
				margin-bottom: 0.35rem;
			}
			input[type='password'] {
				width: 100%;
				padding: 0.55rem 0.65rem;
				border-radius: 0.45rem;
				border: 1px solid var(--border);
				font: inherit;
				margin-bottom: 1rem;
			}
			button {
				width: 100%;
				padding: 0.65rem 1rem;
				border: none;
				border-radius: 0.5rem;
				font: inherit;
				font-weight: 600;
				cursor: pointer;
				background: linear-gradient(145deg, var(--accent), #6b2438);
				color: #fffef9;
			}
			button:disabled {
				opacity: 0.65;
				cursor: not-allowed;
			}
			.msg {
				margin-top: 1rem;
				padding: 0.65rem 0.75rem;
				border-radius: 0.45rem;
				font-size: 0.88rem;
				display: none;
			}
			.msg.visible {
				display: block;
			}
			.msg.ok {
				background: color-mix(in srgb, #35624a 12%, transparent);
				color: #1c221c;
			}
			.msg.err {
				background: color-mix(in srgb, var(--accent) 14%, transparent);
				color: #1c221c;
			}
			.back {
				display: inline-block;
				margin-top: 1.15rem;
				font-size: 0.88rem;
				color: var(--accent);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Déployer le site</h1>
			<p>
				Lance le workflow GitHub Actions (build + Workers). Quelques minutes avant mise à jour sur
				<strong>bouffonsbios.org</strong>.
			</p>
			<form id="deploy-form">
				<label for="secret">Clé de déploiement</label>
				<input
					id="secret"
					name="secret"
					type="password"
					required
					autocomplete="current-password"
					placeholder="Fournie par l’équipe"
				/>
				<button type="submit" id="btn">Lancer le déploiement</button>
			</form>
			<div id="msg" class="msg" role="status"></div>
			<a class="back" href="/admin/">← Retour à l’admin Decap</a>
		</div>
		<script>
			const form = document.getElementById('deploy-form');
			const btn = document.getElementById('btn');
			const msg = document.getElementById('msg');

			form.addEventListener('submit', async (e) => {
				e.preventDefault();
				msg.className = 'msg';
				msg.textContent = '';
				btn.disabled = true;
				const secret = new FormData(form).get('secret');
				try {
					const r = await fetch('/api/deploy', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ secret }),
					});
					const data = await r.json().catch(() => ({}));
					if (r.ok && data.ok) {
						msg.className = 'msg visible ok';
						msg.textContent = data.message || 'C’est parti.';
						form.reset();
					} else {
						msg.className = 'msg visible err';
						msg.textContent = data.error || 'Échec (' + r.status + ').';
						if (data.detail) console.error(data.detail);
					}
				} catch (err) {
					msg.className = 'msg visible err';
					msg.textContent = 'Réseau ou serveur injoignable.';
					console.error(err);
				} finally {
					btn.disabled = false;
				}
			});
		</script>
	</body>
</html>
