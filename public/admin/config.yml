# OAuth : voir README (GitHub App + secrets Wrangler sur bouffonsbios-oauth).
# Site public : https://bouffonsbios.org
site_url: https://bouffonsbios.org
display_url: https://bouffonsbios.org

locale: fr

logo:
  src: /admin/cms-logo.svg
  show_in_header: true

backend:
  name: github
  repo: tmosmant/bouffonsbios
  branch: main
  base_url: https://bouffonsbios-oauth.thomas-mosmant.workers.dev
  auth_endpoint: auth

# Si le proxy (port 8081) répond → fichiers lus sur le disque (idéal en `npm run dev`). Sinon → GitHub : tout fichier absent du dépôt distant provoque du JSON vide / parse error.
# En local : lancer `npm run cms:local` dans un 2ᵉ terminal. En prod, le test localhost:8081 échoue côté navigateur → backend GitHub inchangé.
# Pousser `src/content/navigation.json` sur `main` pour que l’admin fonctionne sans proxy (404 GitHub actuellement).
local_backend: true

media_folder: public/uploads
public_folder: /uploads

collections:
  # En premier : écran d’arrivée Decap = liste des articles (évite d’atterrir sur « home »).
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    preview_path: "/articles/{{slug}}/"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: "Slug (fichier URL)"
        name: slug
        widget: string
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Minuscules et tirets uniquement"]
      - label: Titre
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Catégorie
        name: category
        widget: select
        default: "Non classé"
        options:
          - label: Affiches
            value: Affiches
          - label: "Communiqués de presse"
            value: "Communiqués de presse"
          - label: "Non classé"
            value: "Non classé"
          - label: Vignerons
            value: Vignerons
      - label: Résumé
        name: excerpt
        widget: text
        required: false
      - label: Corps
        name: body
        widget: markdown

  - name: site
    label: Pages du site
    editor:
      preview: true
    files:
      - label: Page d'accueil
        name: hero
        summary: "Badge, dates, titres, programme, infos pratiques, liens d’appel"
        file: src/content/home.json
        format: json
        fields:
          - label: Contenu
            name: hero
            widget: object
            collapsed: false
            fields:
              - label: Titre (onglet du navigateur)
                name: metaTitle
                widget: string
                default: Bouffons Bios
              - label: Description (résumé pour Google)
                name: metaDescription
                widget: text
              - label: "Open Graph — titre du partage"
                hint: "Facebook, WhatsApp, Bluesky… Laisser vide pour un titre auto (marché + date + lieu)."
                name: ogTitle
                widget: string
                required: false
              - label: "Open Graph — texte du partage"
                hint: "Deux ou trois phrases. Vide = texte proposé automatiquement à partir du héros."
                name: ogDescription
                widget: text
                required: false
              - label: "Open Graph — image"
                hint: "Grande image (idéalement ≥ 1200 px de large). Vide = affiche par défaut du site."
                name: ogImage
                widget: image
                required: false
              - label: "Open Graph — description de l’image"
                hint: "Pour l’accessibilité et les aperçus. Vide = libellé basé sur le titre du marché."
                name: ogImageAlt
                widget: string
                required: false
              - label: Badge (pastille au-dessus de la date)
                name: badge
                widget: string
                default: 21ᵉ édition
              - label: Date (attribut machine)
                hint: "Format AAAA-MM-JJ pour le calendrier / SEO"
                name: dateDatetime
                widget: string
              - label: Date affichée
                name: dateLabel
                widget: string
              - label: Horaires
                name: hours
                widget: string
              - label: Titre principal — ligne 1
                name: titleLine1
                widget: string
              - label: Titre principal — ligne 2 (sous-titre)
                name: titleLine2
                widget: string
              - label: Slogan sous le titre
                hint: "Markdown léger — *italique* avec une étoile"
                name: taglineMarkdown
                widget: text
              - label: Lien liste participants — URL
                name: participantsHref
                widget: string
              - label: Lien participants — titre
                name: participantsTitle
                widget: string
              - label: Lien participants — sous-texte
                name: participantsHint
                widget: string
              - label: Lien participants — caractère icône
                hint: "Un seul caractère, ex. ◇"
                name: participantsIcon
                widget: string
                default: ◇
              - label: Encadré « programme » — titre
                name: programTitle
                widget: string
              - label: Encadré « programme » — texte
                hint: "**gras** avec double étoile"
                name: programMarkdown
                widget: text
              - label: Encadré infos pratiques — titre
                name: infosTitle
                widget: string
              - label: Lignes infos pratiques
                name: infoRows
                widget: list
                summary: "{{fields.term}}"
                fields:
                  - label: Libellé (ex. Lieu)
                    name: term
                    widget: string
                  - label: Ligne principale
                    name: line1
                    widget: string
                  - label: Ligne secondaire (style discret)
                    hint: "Si la ligne commence par — ou –, elle reste sur la même ligne que la principale (ex. prix + précision)."
                    name: line2
                    widget: string
                    required: false
              - label: Mention légale (bas de bloc héros)
                hint: "*italique* avec une étoile de chaque côté"
                name: legalMarkdown
                widget: text
              - label: Ligne organisateur / contact
                hint: "Markdown — [libellé](/chemin/) et [téléphone](tel:+33…)"
                name: orgMarkdown
                widget: text
              - label: Bouton principal — libellé
                name: ctaPrimaryLabel
                widget: string
              - label: Bouton principal — lien
                name: ctaPrimaryHref
                widget: string
              - label: Bouton secondaire — libellé
                name: ctaSecondaryLabel
                widget: string
              - label: Bouton secondaire — lien
                name: ctaSecondaryHref
                widget: string

      - label: Bandeau infos (marché, nouveautés…)
        name: flash
        summary: "Activer, texte markdown, lien optionnel, accueil seul ou tout le site"
        file: src/content/flash.json
        format: json
        fields:
          - label: Contenu
            name: flash
            widget: object
            collapsed: false
            fields:
              - label: Afficher le bandeau
                hint: "Désactivé = invisible partout (même si du texte est saisi)."
                name: enabled
                widget: boolean
                default: false
              - label: Visible sur tout le site
                hint: "Sous la navigation sur chaque page. Sinon, uniquement en haut de l’accueil."
                name: showOnAllPages
                widget: boolean
                default: false
              - label: Titre du bloc
                hint: "Optionnel — laissez vide pour un bandeau sans titre."
                name: title
                widget: string
                required: false
              - label: Texte
                hint: "Markdown — **gras**, [lien](url), paragraphes séparés par une ligne vide."
                name: bodyMarkdown
                widget: markdown
              - label: Bouton / lien — libellé
                hint: "Optionnel — avec l’URL ci-dessous."
                name: linkLabel
                widget: string
                required: false
              - label: Bouton / lien — URL
                hint: "Ex. /articles/… ou https://…"
                name: linkHref
                widget: string
                required: false

      # Ne pas nommer un champ de liste « label » : Decap ne charge pas les entrées (conflit interne).
      - label: Menu principal (navigation)
        name: navigation
        summary: "Liens du bandeau — ordre, textes, URLs"
        file: src/content/navigation.json
        format: json
        fields:
          - label: Navigation
            name: nav
            widget: object
            collapsed: false
            fields:
              - label: Liens du menu
                label_singular: lien
                hint: "Ordre = ordre dans la barre. Identifiants : highlight, articles, manifeste, contact, plan (pour la page active)."
                name: items
                widget: list
                min: 1
                max: 15
                # Obligatoire : préfixe fields. (sinon le widget liste peut ne rien afficher / planter)
                summary: "{{fields.title}} → {{fields.href}}"
                fields:
                  - label: Identifiant technique
                    hint: "highlight, articles, manifeste, contact, plan — aligné avec le code des pages."
                    name: id
                    widget: string
                  - label: Texte affiché dans le menu
                    name: title
                    widget: string
                  - label: URL
                    hint: "/articles/ ou https://…"
                    name: href
                    widget: string
                  - label: Mise en avant (typo Fraunces)
                    name: emphasized
                    widget: boolean
                    default: false

      - label: Page contact
        name: contact
        summary: "Cartes e-mail / téléphone, liens utiles, texte d’intro"
        file: src/content/contact.json
        format: json
        fields:
          - label: Contenu de la page
            name: page
            widget: object
            collapsed: false
            fields:
              - label: Titre (onglet du navigateur)
                name: metaTitle
                widget: string
              - label: Description (résumé pour Google)
                name: metaDescription
                widget: text
              - label: Petit surtitre (au-dessus du titre)
                name: eyebrow
                widget: string
                default: Association
              - label: Titre principal
                name: heading
                widget: string
                default: Contact
              - label: Texte d'introduction
                hint: "Markdown simple — ex. **en gras**"
                name: leadMarkdown
                widget: markdown
              - label: Adresse e-mail
                name: email
                widget: string
              - label: Libellé carte e-mail
                name: emailCardLabel
                widget: string
                default: E-mail
              - label: Sous-texte carte e-mail
                name: emailHint
                widget: string
                default: Ouvre votre messagerie
              - label: Téléphone (lien, sans espaces)
                hint: "Ex. +33676692598"
                name: phoneTel
                widget: string
              - label: Libellé carte téléphone
                name: phoneCardLabel
                widget: string
                default: Téléphone
              - label: Nom affiché (carte téléphone)
                name: phoneContactName
                widget: string
              - label: Numéro affiché (lisible)
                hint: "Ex. +33 6 76 69 25 98"
                name: phoneHint
                widget: string
              - label: Titre du bloc liens
                name: asideTitle
                widget: string
                default: À voir aussi
              - label: Liens utiles
                name: asideLinks
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - label: Texte du lien
                    name: label
                    widget: string
                  - label: URL
                    hint: "Commence par / pour une page du site"
                    name: href
                    widget: string
                  - label: Ligne de description
                    name: description
                    widget: string
              - label: Note en bas de page
                name: footnote
                widget: text
                required: false

      - label: Page manifeste
        name: manifeste
        summary: "Chapô, texte du manifeste (markdown), signature"
        file: src/content/manifeste.json
        format: json
        fields:
          - label: Contenu de la page
            name: page
            widget: object
            collapsed: false
            fields:
              - label: Titre (onglet du navigateur)
                name: metaTitle
                widget: string
              - label: Description (résumé pour Google)
                name: metaDescription
                widget: text
              - label: Surtitre (ligne fine au-dessus du titre)
                name: eyebrow
                widget: string
              - label: Titre principal
                name: heading
                widget: string
                default: Manifeste
              - label: Sous-titre (chapô)
                hint: "Une ou deux phrases — apparaît sous le titre principal"
                name: subtitle
                widget: text
              - label: Texte du manifeste
                hint: "Paragraphes séparés par une ligne vide. Markdown : **gras**, [lien](url)"
                name: bodyMarkdown
                widget: markdown
              - label: Signature (bas de page)
                name: signature
                widget: text

      - label: Presse (ils parlent de nous)
        name: presse
        summary: "Titre, intro et liste des liens presse"
        file: src/content/presse.json
        format: json
        fields:
          - label: Contenu
            name: block
            widget: object
            collapsed: false
            fields:
              - label: Titre du bloc
                name: heading
                widget: string
                default: Ils parlent de nous !
              - label: Texte d'introduction
                name: intro
                widget: text
              - label: Liens presse
                name: items
                widget: list
                summary: "{{fields.source}} — {{fields.title}}"
                fields:
                  - label: Média / site
                    name: source
                    widget: string
                  - label: Titre affiché
                    name: title
                    widget: string
                  - label: URL
                    hint: "Lien complet https://…"
                    name: href
                    widget: string
