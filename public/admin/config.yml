# OAuth : voir README (GitHub App + secrets Wrangler sur bouffonsbios-oauth).
# Site public : https://bouffonsbios.org
site_url: https://bouffonsbios.org
display_url: https://bouffonsbios.org

locale: fr

logo:
  src: /admin/cms-logo.svg
  show_in_header: true

backend:
  name: github
  repo: tmosmant/bouffonsbios
  branch: main
  base_url: https://bouffonsbios-oauth.thomas-mosmant.workers.dev
  auth_endpoint: auth

local_backend: true

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: contact
    label: Page contact
    files:
      - label: Contact
        name: contact
        file: src/content/contact.json
        format: json
        fields:
          - label: Contenu de la page
            name: page
            widget: object
            collapsed: false
            fields:
              - label: Titre (onglet du navigateur)
                name: metaTitle
                widget: string
              - label: Description (résumé pour Google)
                name: metaDescription
                widget: text
              - label: Petit surtitre (au-dessus du titre)
                name: eyebrow
                widget: string
                default: Association
              - label: Titre principal
                name: heading
                widget: string
                default: Contact
              - label: Texte d'introduction
                hint: "Markdown simple — ex. **en gras**"
                name: leadMarkdown
                widget: markdown
              - label: Adresse e-mail
                name: email
                widget: string
              - label: Libellé carte e-mail
                name: emailCardLabel
                widget: string
                default: E-mail
              - label: Sous-texte carte e-mail
                name: emailHint
                widget: string
                default: Ouvre votre messagerie
              - label: Téléphone (lien, sans espaces)
                hint: "Ex. +33676692598"
                name: phoneTel
                widget: string
              - label: Libellé carte téléphone
                name: phoneCardLabel
                widget: string
                default: Téléphone
              - label: Nom affiché (carte téléphone)
                name: phoneContactName
                widget: string
              - label: Numéro affiché (lisible)
                hint: "Ex. +33 6 76 69 25 98"
                name: phoneHint
                widget: string
              - label: Titre du bloc liens
                name: asideTitle
                widget: string
                default: À voir aussi
              - label: Liens utiles
                name: asideLinks
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - label: Texte du lien
                    name: label
                    widget: string
                  - label: URL
                    hint: "Commence par / pour une page du site"
                    name: href
                    widget: string
                  - label: Ligne de description
                    name: description
                    widget: string
              - label: Note en bas de page
                name: footnote
                widget: text
                required: false

  - name: manifeste
    label: Page manifeste
    files:
      - label: Manifeste
        name: manifeste
        file: src/content/manifeste.json
        format: json
        fields:
          - label: Contenu de la page
            name: page
            widget: object
            collapsed: false
            fields:
              - label: Titre (onglet du navigateur)
                name: metaTitle
                widget: string
              - label: Description (résumé pour Google)
                name: metaDescription
                widget: text
              - label: Surtitre (ligne fine au-dessus du titre)
                name: eyebrow
                widget: string
              - label: Titre principal
                name: heading
                widget: string
                default: Manifeste
              - label: Sous-titre (chapô)
                hint: "Une ou deux phrases — apparaît sous le titre principal"
                name: subtitle
                widget: text
              - label: Texte du manifeste
                hint: "Paragraphes séparés par une ligne vide. Markdown : **gras**, [lien](url)"
                name: bodyMarkdown
                widget: markdown
              - label: Signature (bas de page)
                name: signature
                widget: text

  - name: presse
    label: Accueil — Ils parlent de nous
    files:
      - label: Bloc presse
        name: presse
        file: src/content/presse.json
        format: json
        fields:
          - label: Contenu
            name: block
            widget: object
            collapsed: false
            fields:
              - label: Titre du bloc
                name: heading
                widget: string
                default: Ils parlent de nous !
              - label: Texte d'introduction
                name: intro
                widget: text
              - label: Liens presse
                name: items
                widget: list
                summary: "{{fields.source}} — {{fields.title}}"
                fields:
                  - label: Média / site
                    name: source
                    widget: string
                  - label: Titre affiché
                    name: title
                    widget: string
                  - label: URL
                    hint: "Lien complet https://…"
                    name: href
                    widget: string

  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    preview_path: "/articles/{{slug}}/"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: "Slug (fichier URL)"
        name: slug
        widget: string
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Minuscules et tirets uniquement"]
      - label: Titre
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Catégorie
        name: category
        widget: select
        default: "Non classé"
        options:
          - label: Affiches
            value: Affiches
          - label: "Communiqués de presse"
            value: "Communiqués de presse"
          - label: "Non classé"
            value: "Non classé"
          - label: Vignerons
            value: Vignerons
      - label: Résumé
        name: excerpt
        widget: text
        required: false
      - label: Corps
        name: body
        widget: markdown
