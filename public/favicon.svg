<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
	<title>Verre de vin — Bouffons Bios</title>
	<style>
		.pied {
			fill: #35624a;
		}
		.tige {
			fill: #35624a;
		}
		.vin {
			fill: #8f2d4a;
		}
		.contour {
			stroke: #35624a;
			stroke-width: 1.15;
			stroke-linejoin: round;
			fill: none;
		}
		.reflet {
			fill: #ffffff;
			opacity: 0.28;
		}
	</style>
	<!-- Pied -->
	<ellipse class="pied" cx="16" cy="26.2" rx="5.8" ry="1.85" />
	<!-- Tige -->
	<rect class="tige" x="14.4" y="16.8" width="3.2" height="8.8" rx="0.55" />
	<!-- Liquide dans le bol -->
	<path
		class="vin"
		d="M11.2 6.2h9.6l-2.85 7.8c-.55 1.5-1.35 2.35-2 2.35h-.1c-.65 0-1.45-.85-2-2.35l-2.85-7.8Z"
	/>
	<!-- Contour du verre (bol) -->
	<path
		class="contour"
		d="M10.2 5.5h11.6l-3.35 9.2c-.9 2.45-2.25 3.8-3.45 3.8h-.8c-1.2 0-2.55-1.35-3.45-3.8L10.2 5.5Z"
	/>
	<!-- Petit reflet -->
	<path class="reflet" d="M12.1 7h2.4v4.2l-1.1 2.6z" />
</svg>
