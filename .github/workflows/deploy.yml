# Déploiement prod : Worker Astro + assets, puis worker Decap OAuth (séparé).
# Déclenché à la demande : page /admin/deploy.html → POST /api/deploy → workflow_dispatch (ou Run workflow sur GitHub).
# Secrets Actions : CLOUDFLARE_API_TOKEN (+ optionnel PUBLIC_MAPBOX_ACCESS_TOKEN).

name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optionnel : le plan d’accès lit surtout l’env Worker en prod ; utile si le build en a besoin.
          PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.PUBLIC_MAPBOX_ACCESS_TOKEN }}

      - name: Deploy site (bouffonsbios)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Decap OAuth worker (bouffonsbios-oauth)
        run: npx wrangler deploy -c workers/decap-oauth/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
